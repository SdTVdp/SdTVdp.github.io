title: SdTVdp's Experience
subtitle: ""
description: 极简、可搜索、专注 Markdown 更新的 Hexo 站点
keywords:
  - hexo
  - markdown
  - butterfly
author: SdTVdp
language: zh-CN
timezone: Asia/Shanghai

url: https://sdtvdp.github.io
root: /
permalink: posts/:slug/
pretty_urls:
  trailing_index: false
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: []
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true

syntax_highlighter: prismjs
prismjs:
  preprocess: true
  line_number: false
  tab_replace: ""

marked:
  prependRoot: true
  postAsset: true

index_generator:
  path: blog
  per_page: 0
  order_by: -date
  pagination_dir: page

per_page: 0
pagination_dir: page
theme: butterfly

search:
  path: search.json
  field: post
  content: true
  format: striptags
