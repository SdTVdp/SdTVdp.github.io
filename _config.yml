title: SdTVdp's Experience
subtitle: ""
description: 极简、可搜索、专注 Markdown 更新的 Hexo 站点
keywords:
  - hexo
  - markdown
  - butterfly
author: SdTVdp
language: zh-CN
timezone: Asia/Shanghai

url: https://sdtvdp.github.io
root: /
permalink: posts/:slug/
pretty_urls:
  trailing_index: false
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
exclude:
  - uploads/backgrounds/background2.mp4
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true

syntax_highlighter: prismjs
prismjs:
  preprocess: true
  line_number: false
  tab_replace: ""

marked:
  prependRoot: true
  postAsset: true

image_pipeline:
  enabled: true
  format: webp
  webp_quality: 82
  avif_quality: 54
  effort: 4
  responsive_widths:
    - 480
    - 768
    - 1200
    - 1600
  sizes: "(max-width: 768px) 100vw, 768px"
  lqip: true
  passthrough:
    - .apng
    - .avif
    - .gif
    - .svg
    - .webp

index_generator:
  path: blog
  per_page: 8
  order_by: -date
  pagination_dir: page

per_page: 8
pagination_dir: page
theme: butterfly

search:
  path: search.json
  field: post
  content: true
  format: striptags
